onboarding_guide_title: How to use the app?
onboarding_guide_text: "1. Open the «Today» screen every day and make entries — it only takes a few seconds.\n\n2. Missed a day? Open «Calendar» and add entries for past days.\n\n3. Forgetting to record? Enable reminders in «Settings», for example in the evening.\n\n4. Regularly check «Report» to notice changes and trends in your wellbeing.\n\n5. Share your achievements — tap «Share» on the «Report» screen and send the image to friends or social media.\n\n6. Want to analyze data further? Export and save your data to a file via «Settings».\n\n7. Use it with care for yourself."
