# ── Default habits ────────────────────────────────────────────────────────────
habits:
  - Walk
  - Exercise
  - Reading
  - Creativity
  - Doing nothing
habit_descriptions:
  Walk: A gentle walk outdoors or walking the dog — even 10 minutes a day can improve how you feel.
  Exercise: Gym, yoga, dancing, running or cycling — cardio or strength, the choice is yours. Just keep moving.
  Reading: A book, article, or blog — a great way to unwind, broaden your horizons, and get new ideas.
  Creativity: Drawing, music, singing, writing, crafts — anything that helps you express yourself, relieve tension, and enjoy the process.
  Doing nothing: Niksen — the Dutch way of spending leisure time, which literally means "doing nothing." The idea is to find time to just be, and let your mind wander wherever it wants.
