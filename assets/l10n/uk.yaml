# ── Default habits ────────────────────────────────────────────────────────────
habits:
  - Прогулянка
  - Руханка
  - Читання
  - Творчість
  - Байдикування
habit_descriptions:
  Прогулянка: Легка прогулянка на свіжому повітрі або вигулювання собаки — навіть 10 хвилин на день можуть покращити самопочуття.
  Руханка: Спортзал, йога, танці, пробіжка чи вело — кардіо чи силові, вибір за тобою, головне — рухатись.
  Читання: Книжка, стаття, блог - хороший спосіб відволіктись, розширити кругозір та отримати нові ідеї.
  Творчість: Малювання, музика, співи, письмо, рукоділля - все, що допомагає виразити себе, зняти напругу та отримати задоволення від процесу.
  Байдикування: Ніксен - нідерландський спосіб проводити дозвілля, що в буквальному перекладі означає "нічого не робити". Ідея полягає в тому, щоб знайти час, щоб просто бути, й дозволити своєму розуму блукати, куди він побажає.