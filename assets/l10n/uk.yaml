onboarding_guide_title: Як користуватись додатком?
onboarding_guide_text: "1. Щодня відкривай екран «Сьогодні» та роби записи — це займе лише кілька секунд.\n\n2. Пропускаєш день запису? Відкривай «Календар» та додавай записи заднім числом.\n\n3. Забуваєш робити записи? Увімкни нагадування в «Налаштуваннях», наприклад на вечір.\n\n4. Регулярно переглядай «Звіт», щоб помічати зміни та динаміку свого стану.\n\n5. Ділися своїми досягненнями — натисни «Поділитись» на екрані «Звіт» та відправ зображення друзям або в соціальні мережі.\n\n6. Хочеш додатково аналізувати дані? Експортуй та зберігай свої дані у файл через «Налаштування».\n\n7. Користуйся з турботою про себе."
