onboarding_guide_title: Як користуватись додатком?
onboarding_guide_text: "Використовуй цей додаток щоб відслідковувати свої стани та краще розуміти себе.\n\nРоби записи щодня, адже це так просто — лише пару кнопок і готово.\n\nКалендар допоможе тобі оновити записи за минувші дні.\n\nУ налаштуваннях ти можеш змінити час нагадування, щоб не забувати робити записи.\n\nЗвіт допоможе зрозуміти зміни за певний період.\n\nВсі дані зберігаються лише на твоєму пристрої. Бережи себе!"
