# ─────────────────────────────────────────────────────────────────────────────
# Atensia – GitHub Actions dev-build pipeline
#
# Triggered automatically for every new commit pushed to a pull request
# (events: opened, synchronize, reopened).  Two build jobs run in parallel:
#
#   • build-android  – produces a release APK (debug-signed) on ubuntu-latest.
#   • build-ios      – produces a signed release IPA on macos-latest.
#
# Both artifacts are uploaded as workflow artifacts (retained 7 days) and
# are also attached to a rolling GitHub Pre-Release that is created or updated
# on every run.  The release uses the fixed tag "latest-dev" so it always
# reflects the most recent PR build.  The release name carries the "-dev"
# suffix as required.
#
# Required secrets:
#   IOS_P12_BASE64       – base64-encoded Distribution certificate (.p12)
#   IOS_P12_PASSWORD     – password for the .p12 file
#   IOS_PROVISION_BASE64 – base64-encoded provisioning profile (.mobileprovision)
#   APPLE_TEAM_ID        – 10-character Apple Team ID
#   ASC_API_KEY_ID       – App Store Connect API key ID (optional, for upload)
#   ASC_API_ISSUER_ID    – App Store Connect API issuer ID (optional, for upload)
#   ASC_API_KEY_BASE64   – base64-encoded App Store Connect API key .p8 (optional, for upload)
# ─────────────────────────────────────────────────────────────────────────────

name: Dev Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'docs/**'
      - '.github/*.md'

jobs:

  # ─── Android build ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK (dev)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Update build number in pubspec.yaml
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i "s/^version: .*/version: ${BASE_VERSION}+${GITHUB_RUN_NUMBER}/" pubspec.yaml

      - name: Build APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          flutter build apk \
            --release \
            --build-name="${VERSION}-dev" \
            --build-number="${GITHUB_RUN_NUMBER}${GITHUB_RUN_ATTEMPT}"
          mv build/app/outputs/flutter-apk/app-release.apk "atensia-${VERSION}-dev-${GITHUB_RUN_NUMBER}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-dev
          path: atensia-*-dev-*.apk
          retention-days: 7

  # ─── iOS build ──────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA (dev)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode -o /tmp/cert.p12
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security list-keychains -s build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain

      - name: Install provisioning profile
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$PP_BASE64" | base64 --decode -o /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          PROFILE_NAME=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract Name xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision
          echo "Provisioning profile installed: ${PROFILE_NAME} (${UUID})"
          echo "PROFILE_NAME=${PROFILE_NAME}" >> $GITHUB_ENV
          echo "PROFILE_UUID=${UUID}" >> $GITHUB_ENV

      - name: Configure Xcode manual signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_NAME}\";/g" \
            ios/Runner.xcodeproj/project.pbxproj
          echo "Xcode project patched for manual signing."

      - name: Update build number in pubspec.yaml
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          sed -i '' "s/^version: .*/version: ${BASE_VERSION}+${GITHUB_RUN_NUMBER}/" pubspec.yaml

      - name: Build IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.texapp.atensia</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          flutter build ipa \
            --release \
            --build-name="${VERSION}-dev" \
            --build-number="${GITHUB_RUN_NUMBER}${GITHUB_RUN_ATTEMPT}" \
            --export-options-plist=/tmp/ExportOptions.plist

          # Patch missing MinimumOSVersion in App.framework (Flutter known issue)
          XCARCHIVE="$PWD/build/ios/archive/Runner.xcarchive"
          APP_PLIST="${XCARCHIVE}/Products/Applications/Runner.app/Frameworks/App.framework/Info.plist"
          if [ -f "$APP_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$APP_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 13.0" "$APP_PLIST"
            echo "Patched MinimumOSVersion=13.0 in App.framework/Info.plist"
          fi

          # Re-export IPA from patched xcarchive so the fix is included
          xcodebuild -exportArchive \
            -archivePath "${XCARCHIVE}" \
            -exportPath "$PWD/build/ios/ipa-patched" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          mv "$PWD/build/ios/ipa-patched/"*.ipa atensia-dev.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-dev
          path: atensia-dev.ipa
          retention-days: 7

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "${ASC_API_KEY_ID}" ]; then
            echo "ASC_API_KEY_ID not set – skipping App Store Connect upload."
            exit 0
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${ASC_API_KEY_BASE64}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file atensia-dev.ipa \
            --apiKey "${ASC_API_KEY_ID}" \
            --apiIssuer "${ASC_API_ISSUER_ID}"
          echo "Uploaded to App Store Connect."

  # ─── Publish rolling dev release ────────────────────────────────────────────
  release:
    name: Publish Dev Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-dev

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-dev

      - name: Prepare release assets
        run: |
          # Keep a fixed-name copy so the GitHub Pages download link stays stable
          cp atensia-*-dev-*.apk atensia-dev.apk

      - name: Publish GitHub Pre-Release (latest-dev)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-dev
          name: "Atensia latest-dev"
          body: |
            **Dev build** – automatically generated from PR #${{ github.event.pull_request.number }} (commit `${{ github.sha }}`).

            > This is a pre-release build and may be unstable.
          prerelease: true
          make_latest: false
          files: |
            atensia-*-dev-*.apk
            atensia-dev.apk
            atensia-dev.ipa

      - name: Update GitHub Pages dev build links
        run: |
          # Already on main (checked out above). Check if dev section is present.
          if grep -q 'latest-dev' docs/index.html; then
            echo "Dev build links already present on main – no update needed."
            exit 0
          fi

          # Pull docs/index.html from the PR branch which has the dev section
          git fetch origin ${{ github.head_ref }}
          git checkout origin/${{ github.head_ref }} -- docs/index.html

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && { echo "No changes."; exit 0; }
          git commit -m "docs: add dev build links to GitHub Pages [skip ci]"
          git push origin HEAD:main
          echo "GitHub Pages updated with dev build links."
