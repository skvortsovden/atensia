# ─────────────────────────────────────────────────────────────────────────────
# Atensia – GitHub Actions release pipeline
#
# Triggered automatically for every tag that matches the pattern v<major>.<minor>.<patch>
# (e.g. v1.7.2).  Two build jobs run in parallel:
#
#   • build-android  – produces a release APK on ubuntu-latest.
#   • build-ios      – produces a release IPA on macos-latest.
#
# Both artifacts are attached to a GitHub Release that is created automatically
# for the triggering tag.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#
#   Android signing (optional – omit to build unsigned):
#     ANDROID_KEYSTORE_BASE64   Base-64-encoded JKS keystore file.
#     ANDROID_STORE_PASSWORD    Keystore password.
#     ANDROID_KEY_ALIAS         Key alias inside the keystore.
#     ANDROID_KEY_PASSWORD      Key password.
#
#   iOS code-signing (optional – omit to build unsigned):
#     IOS_CERTIFICATE_BASE64    Base-64-encoded .p12 distribution certificate.
#     IOS_CERTIFICATE_PASSWORD  Password for the .p12 file.
#     IOS_PROVISIONING_BASE64   Base-64-encoded .mobileprovision profile.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  # ─── Android build ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n' \
              "${ANDROID_STORE_PASSWORD}" \
              "${ANDROID_KEY_PASSWORD}" \
              "${ANDROID_KEY_ALIAS}" \
              > android/key.properties
            echo "Android signing configured."
          else
            echo "ANDROID_KEYSTORE_BASE64 not set – building unsigned APK."
          fi

      - name: Build APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk \
            --release \
            --build-name="${VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}"
          mv build/app/outputs/flutter-apk/app-release.apk atensia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: atensia.apk
          retention-days: 30

  # ─── iOS build ──────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Configure iOS signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_BASE64: ${{ secrets.IOS_PROVISIONING_BASE64 }}
        run: |
          if [ -n "${IOS_CERTIFICATE_BASE64}" ]; then
            echo "${IOS_CERTIFICATE_BASE64}" | base64 -d > /tmp/dist.p12
            KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
            security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
            security import /tmp/dist.p12 -k build.keychain \
              -P "${IOS_CERTIFICATE_PASSWORD}" \
              -T /usr/bin/codesign
            security list-keychains -s build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
            security set-keychain-settings -t 3600 build.keychain
            security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain
            echo "iOS certificate imported."
          else
            echo "IOS_CERTIFICATE_BASE64 not set – building without code signing."
          fi

          if [ -n "${IOS_PROVISIONING_BASE64}" ]; then
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "${IOS_PROVISIONING_BASE64}" | base64 -d \
              > /tmp/app.mobileprovision
            UUID=$(security cms -D -i /tmp/app.mobileprovision | plutil -extract UUID xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            cp /tmp/app.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision
            echo "Provisioning profile installed with UUID: ${UUID}bileprovision | plutil -extract UUID xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
            cp /tmp/app.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision
            echo "Provisioning profile installed with UUID: ${UUID}"
          fi

      - name: Build IPA
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_PROVISIONING_BASE64: ${{ secrets.IOS_PROVISIONING_BASE64 }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${IOS_CERTIFICATE_BASE64}" ] && [ -n "${IOS_PROVISIONING_BASE64}" ]; then
            flutter build ipa \
              --release \
              --build-name="${VERSION}" \
              --build-number="${GITHUB_RUN_NUMBER}"
          else
            flutter build ipa \
              --release \
              --build-name="${VERSION}" \
              --build-number="${GITHUB_RUN_NUMBER}" \
              --no-codesign
          fi
          mv build/ios/ipa/*.ipa atensia.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: atensia.ipa
          retention-days: 30

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Atensia ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            atensia.apk
            atensia.ipa
