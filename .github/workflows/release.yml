# ─────────────────────────────────────────────────────────────────────────────
# Atensia – GitHub Actions release pipeline
#
# Triggered automatically for every tag that matches the pattern v<major>.<minor>.<patch>
# (e.g. v1.7.2).  Two build jobs run in parallel:
#
#   • build-android  – produces a release APK on ubuntu-latest.
#   • build-ios      – produces a release IPA on macos-latest.
#
# Both artifacts are attached to a GitHub Release that is created automatically
# for the triggering tag.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#
#   Android signing (optional – omit to build unsigned):
#     ANDROID_KEYSTORE_BASE64   Base-64-encoded JKS keystore file.
#     ANDROID_STORE_PASSWORD    Keystore password.
#     ANDROID_KEY_ALIAS         Key alias inside the keystore.
#     ANDROID_KEY_PASSWORD      Key password.
#
#   iOS code-signing (optional – omit to build unsigned):
#     IOS_CERTIFICATE_BASE64    Base-64-encoded .p12 distribution certificate.
#     IOS_CERTIFICATE_PASSWORD  Password for the .p12 file.
#     IOS_PROVISIONING_BASE64   Base-64-encoded .mobileprovision profile.
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  # ─── Android build ──────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=release.jks\n' \
              "${ANDROID_STORE_PASSWORD}" \
              "${ANDROID_KEY_PASSWORD}" \
              "${ANDROID_KEY_ALIAS}" \
              > android/key.properties
            echo "Android signing configured."
          else
            echo "ANDROID_KEYSTORE_BASE64 not set – building unsigned APK."
          fi

      - name: Build APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk \
            --release \
            --build-name="${VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}"
          cp build/app/outputs/flutter-apk/app-release.apk "atensia-${GITHUB_REF_NAME}.apk"
          cp "atensia-${GITHUB_REF_NAME}.apk" atensia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            atensia-${{ github.ref_name }}.apk
            atensia.apk
          retention-days: 30

  # ─── iOS build ──────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode -o /tmp/cert.p12
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)
          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security list-keychains -s build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" build.keychain

      - name: Install provisioning profile
        env:
          PP_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$PP_BASE64" | base64 --decode -o /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          PROFILE_NAME=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract Name xml1 - -o - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/"${UUID}".mobileprovision
          echo "Provisioning profile installed: ${PROFILE_NAME} (${UUID})"
          echo "PROFILE_NAME=${PROFILE_NAME}" >> $GITHUB_ENV
          echo "PROFILE_UUID=${UUID}" >> $GITHUB_ENV

      - name: Configure Xcode manual signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          sed -i '' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "Apple Distribution";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_NAME}\";/g" \
            ios/Runner.xcodeproj/project.pbxproj
          echo "Xcode project patched for manual signing."

      - name: Build IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.texapp.atensia</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          flutter build ipa \
            --release \
            --build-name="${VERSION}" \
            --build-number="${GITHUB_RUN_NUMBER}" \
            --export-options-plist=/tmp/ExportOptions.plist

          # Patch missing MinimumOSVersion in App.framework (Flutter known issue)
          XCARCHIVE="$PWD/build/ios/archive/Runner.xcarchive"
          APP_PLIST="${XCARCHIVE}/Products/Applications/Runner.app/Frameworks/App.framework/Info.plist"
          if [ -f "$APP_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$APP_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 13.0" "$APP_PLIST"
            echo "Patched MinimumOSVersion=13.0 in App.framework/Info.plist"
          fi

          # Re-export IPA from patched xcarchive so the fix is included
          xcodebuild -exportArchive \
            -archivePath "${XCARCHIVE}" \
            -exportPath "$PWD/build/ios/ipa-patched" \
            -exportOptionsPlist /tmp/ExportOptions.plist

          cp "$PWD/build/ios/ipa-patched/"*.ipa "atensia-${GITHUB_REF_NAME}.ipa"
          cp "atensia-${GITHUB_REF_NAME}.ipa" atensia.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: |
            atensia-${{ github.ref_name }}.ipa
            atensia.ipa
          retention-days: 30

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "${ASC_API_KEY_ID}" ]; then
            echo "ASC_API_KEY_ID not set – skipping App Store Connect upload."
            exit 0
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${ASC_API_KEY_BASE64}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file atensia.ipa \
            --apiKey "${ASC_API_KEY_ID}" \
            --apiIssuer "${ASC_API_ISSUER_ID}"
          echo "Uploaded to App Store Connect."

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Atensia ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            atensia-${{ github.ref_name }}.apk
            atensia-${{ github.ref_name }}.ipa
            atensia.apk
            atensia.ipa


